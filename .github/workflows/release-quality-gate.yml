name: release-quality-gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  frontier-fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install pytest

      - name: Run frontier semantic drift checks (fail-fast)
        run: |
          pytest tests/test_release_gate.py tests/test_report_significance_summary.py tests/test_strategy_playbook.py tests/test_policy_simulator.py -v

  quality-gate:
    needs: frontier-fast-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install faker statsmodels memory-profiler pytest

      - name: Run smoke benchmark
        run: |
          python main.py --all --smoke-test --n-runs 1 --seed 42

      - name: Generate benchmark card
        run: |
          python main.py --benchmark-card --output-dir results

      - name: Validate artifacts
        run: |
          python main.py --validate

      - name: Run release gate
        run: |
          python main.py --release-gate

      - name: Verify snapshot restore flow
        run: |
          python main.py --snapshot-tag ci-restore-check
          python main.py --restore-snapshot ci-restore-check --output-dir restored_results
          python main.py --release-gate --output-dir restored_results

      - name: Run reliability gate tests
        run: |
          pytest tests/test_artifact_validator.py tests/test_release_gate.py tests/test_release_snapshot.py tests/test_snapshot_restore.py -v
