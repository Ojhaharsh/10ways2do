name: release-quality-gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install faker statsmodels memory-profiler pytest

      - name: Run smoke benchmark
        run: |
          python main.py --all --smoke-test --n-runs 1 --seed 42

      - name: Validate artifacts
        run: |
          python main.py --validate

      - name: Run release gate
        run: |
          python main.py --release-gate

      - name: Run reliability gate tests
        run: |
          pytest tests/test_artifact_validator.py tests/test_release_gate.py -v
