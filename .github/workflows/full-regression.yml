name: full-regression

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install faker statsmodels memory-profiler pytest

      - name: Run full pytest suite
        run: |
          pytest tests -v

      - name: Run preflight gate
        run: |
          python main.py --preflight --n-runs 1 --seed 42
