name: benchmark-smoke

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install faker statsmodels memory-profiler pytest

      - name: Run smoke benchmark
        run: |
          python main.py --all --smoke-test --n-runs 1 --seed 42

      - name: Run smoke artifact tests
        run: |
          pytest tests/test_benchmark_smoke_artifacts.py -v
